{% extends 'gestion/base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl">
  <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white/90 shadow-xl shadow-slate-200/60">
    <div class="bg-gradient-to-r from-cyan-600 to-sky-600 px-6 py-5 text-white">
      <h1 class="text-xl font-extrabold tracking-tight">{{ titulo }}</h1>
    </div>
    <div class="p-6 sm:p-8">
      <form method="post" class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
          <div>
            <label class="text-sm font-semibold text-slate-700">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <p class="mt-2 text-sm font-medium text-rose-600">{{ field.errors|striptags }}</p>
            {% endif %}
          </div>
        {% endfor %}

        <div class="flex flex-wrap gap-3 pt-2">
          <button type="submit" class="rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-bold text-white transition hover:bg-emerald-500">Guardar</button>
          <a href="{% url 'lista_autores' %}" class="rounded-xl bg-slate-200 px-4 py-2.5 text-sm font-bold text-slate-700 transition hover:bg-slate-300">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
