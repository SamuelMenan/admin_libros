{% extends 'gestion/base.html' %}
{% block title %}Eliminar Libro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white"><h5 class="mb-0">⚠️ Confirmar Eliminación</h5></div>
      <div class="card-body">
        <p>¿Estás seguro que deseas eliminar el libro <strong>{{ libro.titulo }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
